<!-- Se agregan: gráfica de tendencia + coach financiero automático -->

<script>

/* ======================
   DASHBOARD: TENDENCIA
====================== */
function generateTrendData() {
  const recordsByDate = {};

  records.forEach(r => {
    if (!recordsByDate[r.date]) {
      recordsByDate[r.date] = { income: 0, expense: 0 };
    }

    if (r.type === 'income') recordsByDate[r.date].income += r.amount;
    else recordsByDate[r.date].expense += r.amount;
  });

  const dates = Object.keys(recordsByDate).sort();

  let balance = 0;
  const trend = dates.map(date => {
    balance += recordsByDate[date].income - recordsByDate[date].expense;
    return balance;
  });

  return { dates, trend };
}

function renderTrendChart() {
  const { dates, trend } = generateTrendData();

  const ctx = document.createElement('canvas');
  ctx.style.marginTop = '20px';

  elements.chartCanvas.parentNode.appendChild(ctx);

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates,
      datasets: [{
        label: 'Evolución del balance',
        data: trend,
        fill: true,
        tension: 0.3
      }]
    }
  });
}

/* ======================
   COACH FINANCIERO
====================== */
function generateCoachAdvice() {
  const totals = getTotals();
  const expenses = records.filter(r => r.type === 'expense');

  if (records.length < 3) {
    return ['Agrega más datos para recibir recomendaciones.'];
  }

  const grouped = groupBy(expenses, getRecordLabel);
  const top = Object.entries(grouped).sort((a,b)=>b[1]-a[1])[0];

  const advice = [];

  if (totals.balance < 0) {
    advice.push('🚨 Estás gastando más de lo que ganas. Prioriza reducir gastos.');
  }

  if (top) {
    advice.push(`🎯 Tu mayor gasto es ${top[0]}. Reducirlo tendría mayor impacto.`);
  }

  const unplanned = expenses.filter(r => r.category === 'Gastos no planeados');
  if (unplanned.length > 2) {
    advice.push('⚠️ Tienes muchos gastos no planeados. Considera un presupuesto más estricto.');
  }

  if (totals.income > totals.expense) {
    advice.push('💡 Tienes capacidad de ahorro. Considera guardar al menos 20%.');
  }

  return advice;
}

/* ======================
   INTEGRACIÓN EN RESUMEN
====================== */
const originalRenderAchievementSummary = renderAchievementSummary;
renderAchievementSummary = function() {
  originalRenderAchievementSummary();

  const coach = generateCoachAdvice();

  const coachHTML = `
    <hr style="border-color: var(--border); opacity: 0.5;">
    <h3 style="color: var(--cyan);">Coach financiero</h3>
    ${coach.map(c => `<p>${c}</p>`).join('')}
  `;

  elements.achievementList.innerHTML += coachHTML;
};

/* ======================
   HOOK DASHBOARD
====================== */
const originalRender = render;
render = function() {
  originalRender();

  if (mainTab === 'charts' && mode === 'balance') {
    renderTrendChart();
  }
};

</script>
