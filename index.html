<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Cantidades</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --panel: rgba(12, 18, 38, 0.78);
      --panel-strong: rgba(15, 23, 42, 0.92);
      --cyan: #00f5ff;
      --pink: #ff2bd6;
      --yellow: #f8f32b;
      --green: #22ff88;
      --red: #ff3b5c;
      --muted: #9ca3af;
      --text: #f8fafc;
      --input-bg: rgba(2, 6, 23, 0.82);
      --table-bg: rgba(2, 6, 23, 0.5);
      --border: rgba(0, 245, 255, 0.28);
      --shadow-main: 0 0 18px rgba(0, 245, 255, 0.35);
      --shadow-accent: 0 0 18px rgba(255, 43, 214, 0.35);
      --title-shadow: 0 0 12px rgba(0, 245, 255, 0.8), 2px 2px 0 rgba(255, 43, 214, 0.55);
    }

    * { box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      padding: 16px;
      background:
        radial-gradient(circle at top left, rgba(0, 245, 255, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 43, 214, 0.22), transparent 34%),
        linear-gradient(135deg, #050510 0%, #09091f 45%, #020617 100%);
      overflow-x: hidden;
    }

    body::before, body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    body::before {
      background-image:
        linear-gradient(rgba(0, 245, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 43, 214, 0.045) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent 85%);
    }

    body::after { display: none; }

    body.theme-basic {
      --panel: #ffffff;
      --panel-strong: #ffffff;
      --cyan: #2563eb;
      --pink: #64748b;
      --yellow: #111827;
      --green: #16a34a;
      --red: #dc2626;
      --muted: #64748b;
      --text: #111827;
      --input-bg: #ffffff;
      --table-bg: #ffffff;
      --border: rgba(15, 23, 42, 0.12);
      --shadow-main: 0 10px 26px rgba(15, 23, 42, 0.10);
      --shadow-accent: 0 10px 26px rgba(15, 23, 42, 0.10);
      --title-shadow: none;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
    }

    body.theme-basic::before, body.theme-basic::after { display: none; }

    body.theme-fallout {
      --panel: rgba(6, 31, 13, 0.88);
      --panel-strong: rgba(2, 20, 8, 0.95);
      --cyan: #39ff14;
      --pink: #b6ff5c;
      --yellow: #d9ff66;
      --green: #39ff14;
      --red: #ffb000;
      --muted: #8fcf78;
      --text: #d8ffd2;
      --input-bg: rgba(2, 20, 8, 0.82);
      --table-bg: rgba(2, 20, 8, 0.55);
      --border: rgba(57, 255, 20, 0.34);
      --shadow-main: 0 0 18px rgba(57, 255, 20, 0.26);
      --shadow-accent: 0 0 18px rgba(255, 176, 0, 0.18);
      --title-shadow: 0 0 12px rgba(57, 255, 20, 0.5);
      background:
        radial-gradient(circle at center, rgba(57, 255, 20, 0.12), transparent 35%),
        linear-gradient(135deg, #031006, #071a09 55%, #020802);
    }

    body.theme-fallout::before {
      display: block;
      background-image:
        linear-gradient(rgba(57, 255, 20, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57, 255, 20, 0.055) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: none;
    }

    body.theme-fallout::after {
      display: block;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.035), rgba(255,255,255,0.035) 1px, transparent 1px, transparent 4px);
      mix-blend-mode: overlay;
    }

    body.theme-ninja {
      --panel: rgba(10, 10, 10, 0.9);
      --panel-strong: rgba(5, 5, 5, 0.95);
      --cyan: #9ca3af;
      --pink: #111827;
      --yellow: #e5e7eb;
      --green: #4ade80;
      --red: #ef4444;
      --muted: #6b7280;
      --text: #e5e7eb;
      --input-bg: rgba(0,0,0,0.72);
      --table-bg: rgba(0,0,0,0.52);
      --border: rgba(255, 255, 255, 0.08);
      --shadow-main: 0 0 10px rgba(255,255,255,0.08);
      --shadow-accent: 0 0 10px rgba(0,0,0,0.6);
      --title-shadow: 2px 2px 0 #111827, 0 0 8px rgba(239, 68, 68, 0.28);
      background: radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 40%), #020303;
    }

    body.theme-ninja::before {
      display: block;
      background-image:
        linear-gradient(135deg, rgba(255,255,255,0.025) 25%, transparent 25%),
        linear-gradient(225deg, rgba(255,255,255,0.02) 25%, transparent 25%);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent 90%);
    }

    body.theme-ninja::after {
      display: block;
      background:
        radial-gradient(circle at 20% 15%, rgba(239,68,68,0.10), transparent 18%),
        radial-gradient(circle at 80% 85%, rgba(156,163,175,0.08), transparent 22%);
    }

    body.theme-kuromi {
      --panel: rgba(25, 16, 35, 0.9);
      --panel-strong: rgba(20, 10, 30, 0.95);
      --cyan: #c084fc;
      --pink: #f472b6;
      --yellow: #e879f9;
      --green: #a78bfa;
      --red: #fb7185;
      --text: #f5f3ff;
      --input-bg: rgba(20, 10, 30, 0.82);
      --table-bg: rgba(20, 10, 30, 0.52);
      --border: rgba(192,132,252,0.3);
      --shadow-main: 0 0 18px rgba(192,132,252,0.24);
      --shadow-accent: 0 0 18px rgba(244,114,182,0.24);
      --title-shadow: 0 0 12px rgba(192,132,252,0.45);
      background: radial-gradient(circle at top, rgba(192,132,252,0.2), transparent 40%), #140b1f;
    }

    body.theme-monster {
      --panel: rgba(0, 0, 0, 0.9);
      --panel-strong: rgba(10, 10, 10, 0.95);
      --cyan: #39ff14;
      --pink: #22ff88;
      --yellow: #ccff00;
      --green: #39ff14;
      --red: #fffb00;
      --text: #eaffea;
      --input-bg: rgba(0,0,0,0.82);
      --table-bg: rgba(0,0,0,0.52);
      --border: rgba(57,255,20,0.35);
      --shadow-main: 0 0 18px rgba(57,255,20,0.26);
      --shadow-accent: 0 0 18px rgba(204,255,0,0.22);
      --title-shadow: 0 0 12px rgba(57,255,20,0.55);
      background: radial-gradient(circle, rgba(57,255,20,0.15), transparent 40%), #000;
    }

    body.theme-monster-zero {
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --cyan: #0ea5e9;
      --pink: #bfe9ff;
      --yellow: #38bdf8;
      --green: #0284c7;
      --red: #38bdf8;
      --muted: #64748b;
      --text: #0f172a;
      --input-bg: rgba(255,255,255,0.9);
      --table-bg: rgba(255,255,255,0.72);
      --border: rgba(180, 220, 255, 0.5);
      --shadow-main: 0 0 25px rgba(191, 233, 255, 0.7);
      --shadow-accent: 0 0 15px rgba(224, 247, 255, 0.6);
      --title-shadow: 0 0 10px rgba(56,189,248,0.6);
      background:
        radial-gradient(circle at 20% 10%, rgba(191,233,255,0.4), transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(224,247,255,0.35), transparent 45%),
        linear-gradient(135deg, #ffffff 0%, #f8fcff 35%, #eef8ff 100%);
    }

    body.theme-monster-zero::before {
      display: block;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 1px),
        radial-gradient(circle, rgba(180,220,255,0.3) 1px, transparent 1px);
      background-size: 14px 14px, 22px 22px;
      opacity: 0.25;
      mix-blend-mode: overlay;
      mask-image: none;
    }

    body.theme-monster-zero::after {
      display: block;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.6) 2px, transparent 3px),
        radial-gradient(circle at 60% 70%, rgba(255,255,255,0.5) 2px, transparent 3px),
        radial-gradient(circle at 80% 40%, rgba(180,220,255,0.5) 2px, transparent 3px);
      background-size: 120px 120px;
      opacity: 0.35;
    }

    body.theme-cinnamon {
      --panel: rgba(240, 249, 255, 0.9);
      --panel-strong: rgba(255, 255, 255, 0.95);
      --cyan: #38bdf8;
      --pink: #bae6fd;
      --yellow: #7dd3fc;
      --green: #38bdf8;
      --red: #fbcfe8;
      --muted: #64748b;
      --text: #0c4a6e;
      --input-bg: rgba(255,255,255,0.92);
      --table-bg: rgba(255,255,255,0.7);
      --border: rgba(56,189,248,0.3);
      --shadow-main: 0 0 18px rgba(56,189,248,0.2);
      --shadow-accent: 0 0 18px rgba(186,230,253,0.3);
      --title-shadow: none;
      background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
    }

    body.theme-pixel {
      --panel: rgba(17, 24, 39, 0.92);
      --panel-strong: rgba(3, 7, 18, 0.96);
      --cyan: #00e5ff;
      --pink: #ff2e88;
      --yellow: #ffd60a;
      --green: #7cff00;
      --red: #ff3131;
      --muted: #9ca3af;
      --text: #f8fafc;
      --input-bg: rgba(3, 7, 18, 0.9);
      --table-bg: rgba(3, 7, 18, 0.62);
      --border: rgba(255, 214, 10, 0.42);
      --shadow-main: 0 0 0 3px rgba(0,0,0,0.45), 0 0 18px rgba(255,214,10,0.22);
      --shadow-accent: 0 0 18px rgba(255,46,136,0.28);
      --title-shadow: 3px 3px 0 #ff2e88, 6px 6px 0 #00e5ff;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.04) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.04) 25%, transparent 25%),
        #111827;
      background-size: 18px 18px;
    }

    body.theme-pacman {
      --panel: rgba(0, 0, 0, 0.92);
      --panel-strong: rgba(0, 0, 0, 0.96);
      --cyan: #00a8ff;
      --pink: #ff4fd8;
      --yellow: #ffe600;
      --green: #00ff66;
      --red: #ff3b30;
      --muted: #facc15;
      --text: #fff7cc;
      --input-bg: rgba(0, 0, 0, 0.9);
      --table-bg: rgba(0, 0, 0, 0.68);
      --border: rgba(255, 230, 0, 0.55);
      --shadow-main: 0 0 18px rgba(255, 230, 0, 0.36);
      --shadow-accent: 0 0 18px rgba(0, 168, 255, 0.28);
      --title-shadow: 3px 3px 0 #00a8ff, 6px 6px 0 #ff4fd8;
      background:
        radial-gradient(circle, rgba(255,230,0,0.9) 2px, transparent 3px),
        linear-gradient(90deg, rgba(0,168,255,0.16) 2px, transparent 2px),
        linear-gradient(rgba(0,168,255,0.16) 2px, transparent 2px),
        #000;
      background-size: 42px 42px, 42px 42px, 42px 42px, auto;
    }

    .app { max-width: 900px; margin: 0 auto; }

    .app-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

    h1 {
      margin: 8px 0 16px;
      font-size: 34px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: var(--title-shadow);
    }

    h2 {
      color: var(--yellow);
      letter-spacing: 0.7px;
      text-transform: uppercase;
      font-size: 18px;
    }

    body.theme-basic h1, body.theme-cinnamon h1 { text-transform: none; letter-spacing: 0; }

    body.theme-fallout h1,
    body.theme-fallout h2,
    body.theme-fallout button,
    body.theme-fallout label,
    body.theme-fallout th,
    body.theme-ninja h1,
    body.theme-ninja h2,
    body.theme-ninja button,
    body.theme-ninja label,
    body.theme-ninja th,
    body.theme-ninja input,
    body.theme-ninja select,
    body.theme-pixel h1,
    body.theme-pixel h2,
    body.theme-pixel button,
    body.theme-pixel label,
    body.theme-pixel th,
    body.theme-pixel input,
    body.theme-pixel select,
    body.theme-pacman h1,
    body.theme-pacman h2,
    body.theme-pacman button,
    body.theme-pacman label,
    body.theme-pacman th,
    body.theme-pacman input,
    body.theme-pacman select { font-family: 'Courier New', monospace; }

    body.theme-ninja h1::before { content: '忍 '; color: #ef4444; }
    body.theme-ninja h2::before { content: '影 / '; color: #ef4444; }
    body.theme-pixel h1::before { content: '▣ '; color: var(--yellow); }
    body.theme-pacman h1::before { content: '● '; color: var(--yellow); }

    .main-tabs, .chart-tabs, .summary, .filters { display: grid; gap: 10px; margin-bottom: 16px; }
    .main-tabs { grid-template-columns: 1fr 1fr; }
    .chart-tabs { grid-template-columns: repeat(3, 1fr); }
    .summary { grid-template-columns: repeat(3, 1fr); }
    .filters { grid-template-columns: 1fr 1fr; }

    button {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.88));
      color: var(--text);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: inset 0 0 18px rgba(0, 245, 255, 0.06), 0 0 10px rgba(0, 245, 255, 0.1);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    button:hover { transform: translateY(-1px); border-color: var(--pink); box-shadow: var(--shadow-accent); }

    button.active {
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      color: #020617;
      border-color: var(--yellow);
      box-shadow: var(--shadow-main), var(--shadow-accent);
    }

    body.theme-cyberpunk button.active {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #00f5ff, #ff2bd6);
      color: #020617;
      border-color: #f8f32b;
      box-shadow: 0 0 18px rgba(0,245,255,0.6), 0 0 18px rgba(255,43,214,0.5);
      animation: cyberGlitchPulse 0.42s ease-out;
    }

    body.theme-cyberpunk button.active::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-120%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.65), transparent);
      animation: cyberScan 0.55s ease-out;
      pointer-events: none;
    }

    @keyframes cyberScan { from { transform: translateX(-120%); } to { transform: translateX(120%); } }
    @keyframes cyberGlitchPulse {
      0% { filter: hue-rotate(0deg) brightness(1); transform: translateX(0); }
      18% { filter: hue-rotate(45deg) brightness(1.4); transform: translateX(-1px); }
      32% { filter: hue-rotate(-30deg) brightness(1.2); transform: translateX(1px); }
      55% { filter: hue-rotate(20deg) brightness(1.35); transform: translateX(-1px); }
      100% { filter: hue-rotate(0deg) brightness(1); transform: translateX(0); }
    }

    button.danger {
      background: linear-gradient(135deg, #7f1d1d, var(--red));
      color: white;
      border-color: var(--red);
    }

    .settings-button { width: 48px; height: 48px; padding: 0; font-size: 22px; flex: 0 0 48px; }

    body.theme-ninja button { border-radius: 6px; background: linear-gradient(135deg, #050505, #111827); border-color: rgba(255,255,255,0.10); box-shadow: inset 3px 0 0 rgba(239,68,68,0.55), 0 8px 18px rgba(0,0,0,0.35); transition-duration: 0.08s; }
    body.theme-ninja button:hover { transform: translateX(2px); border-color: rgba(239,68,68,0.55); filter: brightness(1.15); box-shadow: inset 3px 0 0 #ef4444, 0 0 12px rgba(239,68,68,0.22); }
    body.theme-ninja button.active { background: linear-gradient(135deg, #ef4444, #111827); color: #f9fafb; border-color: rgba(255,255,255,0.22); box-shadow: inset 3px 0 0 #f9fafb, 0 0 14px rgba(239,68,68,0.28); }

    body.theme-monster-zero button { background: linear-gradient(135deg, #e0f7ff, #bfe9ff); color: #0f172a; border-color: rgba(56,189,248,0.6); box-shadow: 0 0 12px rgba(56,189,248,0.3); }
    body.theme-monster-zero button.active { background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: white; }

    body.theme-pixel button,
    body.theme-pixel input,
    body.theme-pixel select,
    body.theme-pixel .card,
    body.theme-pacman button,
    body.theme-pacman input,
    body.theme-pacman select,
    body.theme-pacman .card { border-radius: 0; image-rendering: pixelated; }

    body.theme-pixel button,
    body.theme-pacman button { box-shadow: 4px 4px 0 rgba(0,0,0,0.75), inset 0 0 0 2px rgba(255,255,255,0.08); }
    body.theme-pixel button:hover,
    body.theme-pacman button:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.8); }
    body.theme-pacman button.active { background: linear-gradient(135deg, #ffe600, #ffb703); color: #000; border-color: #00a8ff; }

    .card {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.5), var(--shadow-main);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(0, 245, 255, 0.12), transparent 22%, transparent 76%, rgba(255, 43, 214, 0.12));
    }

    body.theme-basic .card,
    body.theme-basic .summary-box,
    body.theme-basic table { backdrop-filter: none; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); }
    body.theme-basic .card::before { display: none; }
    body.theme-ninja .card { border-radius: 8px; box-shadow: 0 18px 38px rgba(0,0,0,0.65), inset 4px 0 0 rgba(239,68,68,0.38); backdrop-filter: blur(6px); }
    body.theme-monster-zero .card { border-color: rgba(191,233,255,0.6); box-shadow: 0 20px 40px rgba(56,189,248,0.2); backdrop-filter: blur(12px); }

    label { display: block; margin-bottom: 6px; color: var(--cyan); font-size: 13px; letter-spacing: 0.7px; text-transform: uppercase; }

    input, select {
      width: 100%;
      padding: 13px;
      margin-bottom: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      outline: none;
      box-shadow: inset 0 0 14px rgba(0, 245, 255, 0.06);
    }

    input:focus, select:focus { border-color: var(--pink); box-shadow: 0 0 12px rgba(255, 43, 214, 0.28), inset 0 0 14px rgba(0, 245, 255, 0.09); }
    select option { background: #020617; color: white; }
    body.theme-basic select option, body.theme-cinnamon select option, body.theme-monster-zero select option { background: white; color: #0f172a; }
    body.theme-ninja input, body.theme-ninja select { border-radius: 4px; box-shadow: inset 3px 0 0 rgba(239,68,68,0.35); }

    .hidden { display: none !important; }

    .error {
      color: #ffe4e6;
      background: rgba(127, 29, 29, 0.82);
      border: 1px solid rgba(255, 59, 92, 0.6);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      box-shadow: 0 0 14px rgba(255, 59, 92, 0.25);
    }

    .summary-box {
      background: var(--table-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px;
      box-shadow: inset 0 0 8px rgba(0, 245, 255, 0.08);
    }

    .summary-box span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.7px; }
    .summary-box strong {
      font-size: 16px;
      color: var(--green);
      text-shadow: 0 0 6px rgba(34, 255, 136, 0.35);
    }

    canvas {
      background: transparent;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 12px rgba(0, 245, 255, 0.22));
      animation: breathe 3s infinite ease-in-out;
    }

    @keyframes breathe { 0% { transform: scale(1); } 50% { transform: scale(1.015); } 100% { transform: scale(1); } }

    .records-toggle { margin: 6px 0 14px; }

    .records-panel {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.25s ease;
    }

    .records-panel.open {
      max-height: 900px;
      opacity: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
      background: var(--table-bg);
      border-radius: 14px;
      overflow: hidden;
    }

    th, td { padding: 10px; border-bottom: 1px solid rgba(0, 245, 255, 0.17); text-align: left; }
    th { color: var(--cyan); text-transform: uppercase; letter-spacing: 0.6px; font-size: 12px; background: rgba(0, 245, 255, 0.06); }
    td { color: var(--text); }
    tr:hover td { background: rgba(255, 43, 214, 0.06); }

    .settings-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(2, 6, 23, 0.72);
      backdrop-filter: blur(10px);
    }

    .settings-modal.hidden { display: none; }

      if (!confirm('¿Seguro que quieres borrar todos los registros?')) return;
      records = [];
      localStorage.removeItem(STORAGE_KEY);
      playDeleteSound();
      render();
    }

    function deleteRecord(id) { records = records.filter((record) => String(record.id) !== String(id)); saveRecords(); playDeleteSound(); render(); }

    function getFilteredRecords() {
      return records.filter((record) => {
        const afterStart = !elements.startDateInput.value || record.date >= elements.startDateInput.value;
        const beforeEnd = !elements.endDateInput.value || record.date <= elements.endDateInput.value;
        return afterStart && beforeEnd;
      });
    }

    function getVisibleRecords() {
      const filtered = getFilteredRecords();
      if (mode === 'income') return filtered.filter((record) => record.type === 'income');
      if (mode === 'expense') return filtered.filter((record) => record.type === 'expense');
      return filtered;
    }

    function getRecordLabel(record) { if (record.type === 'income') return record.origin || 'Sin origen'; if (record.category === 'Otros') return `Otros: ${record.detail || 'Sin detalle'}`; return record.category || 'Sin etiqueta'; }
    function getTotals(recordsToUse = getFilteredRecords()) { const income = recordsToUse.filter((r) => r.type === 'income').reduce((s, r) => s + Number(r.amount || 0), 0); const expense = recordsToUse.filter((r) => r.type === 'expense').reduce((s, r) => s + Number(r.amount || 0), 0); return { income, expense, balance: income - expense }; }
    function groupBy(recordsToGroup, labelGetter) { return recordsToGroup.reduce((map, record) => { const key = labelGetter(record); map[key] = (map[key] || 0) + Number(record.amount || 0); return map; }, {}); }

    function getChartData() {
      const filtered = getFilteredRecords();
      if (mode === 'balance') { const totals = getTotals(filtered); return { labels: ['Ganancias', 'Gastos'], values: [totals.income, totals.expense] }; }
      if (mode === 'income') { const grouped = groupBy(filtered.filter((r) => r.type === 'income'), (r) => r.origin || 'Sin origen'); return { labels: Object.keys(grouped), values: Object.values(grouped) }; }
      const grouped = groupBy(filtered.filter((r) => r.type === 'expense'), getRecordLabel);
      return { labels: Object.keys(grouped), values: Object.values(grouped) };
    }

    function formatMoney(value) { return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(value); }
    function escapeExcel(value) { return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function downloadExcel() {
      const rows = records.map((record) => `<tr><td>${escapeExcel(record.date)}</td><td>${escapeExcel(record.type === 'income' ? 'Ganancia' : 'Gasto')}</td><td>${escapeExcel(getRecordLabel(record))}</td><td>${Number(record.amount || 0)}</td></tr>`).join('');
      const html = `<html><head><meta charset="UTF-8"></head><body><table border="1"><thead><tr><th>Fecha</th><th>Tipo</th><th>Origen / Etiqueta</th><th>Cantidad</th></tr></thead><tbody>${rows}</tbody></table></body></html>`;
      const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `control-cantidades-${new Date().toISOString().slice(0, 10)}.xls`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      playSwitchSound();
    }

    function renderSummary() {
      const totals = getTotals();

      elements.incomeTotal.textContent = formatMoney(totals.income);
      elements.expenseTotal.textContent = formatMoney(totals.expense);
      elements.balanceTotal.textContent = formatMoney(totals.balance);

      const boxes = document.querySelectorAll('.summary-box');
      boxes.forEach(box => box.classList.remove('hidden'));

      if (mode === 'income') {
        boxes[1].classList.add('hidden'); // gastos
        boxes[2].classList.add('hidden'); // balance
      } else if (mode === 'expense') {
        boxes[0].classList.add('hidden'); // ganancias
        boxes[2].classList.add('hidden'); // balance
      }
      // balance muestra todo
    }

    function renderTable() {
      const visibleRecords = getVisibleRecords();
      if (visibleRecords.length === 0) { elements.recordsTable.innerHTML = '<tr><td colspan="5">No hay registros para mostrar.</td></tr>'; return; }
      elements.recordsTable.innerHTML = [...visibleRecords].sort((a, b) => b.date.localeCompare(a.date)).map((record) => `
        <tr>
          <td>${record.date}</td>
          <td>${record.type === 'income' ? 'Ganancia' : 'Gasto'}</td>
          <td>${getRecordLabel(record)}</td>
          <td>${formatMoney(Number(record.amount || 0))}</td>
          <td><button type="button" data-edit-id="${record.id}">Editar</button><button class="danger" type="button" data-delete-id="${record.id}">Borrar</button></td>
        </tr>`).join('');
    }

    function getColors(count) { const selected = PALETTES[getActiveTheme()] || PALETTES.cyberpunk; if (mode === 'balance') return selected.balance; const palette = mode === 'income' ? selected.income : selected.expense; return Array.from({ length: count }, (_, index) => palette[index % palette.length]); }

    const glowPlugin = { id: 'glowPlugin', beforeDatasetDraw(chart) { const theme = getActiveTheme(); const { ctx } = chart; ctx.save(); ctx.shadowColor = theme === 'monster-zero' ? 'rgba(56,189,248,0.45)' : 'rgba(0, 245, 255, 0.6)'; ctx.shadowBlur = theme === 'basic' ? 0 : 20; }, afterDatasetDraw(chart) { chart.ctx.restore(); } };

    function animateValue(target) {
      const start = 0;
      const duration = 700;
      const startTime = performance.now();

      function update(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        animatedValue = start + (target - start) * eased;

        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          animatedValue = target;
        }
      }

      requestAnimationFrame(update);
    }

    const centerTextPlugin = {
      id: 'centerTextPlugin',
      afterDraw(chart) {
        const { ctx, chartArea } = chart;
        if (!chartArea) return;

        const centerX = (chartArea.left + chartArea.right) / 2;
        const centerY = (chartArea.top + chartArea.bottom) / 2;
        const totals = getTotals();
        const value = mode === 'balance' ? totals.balance : mode === 'income' ? totals.income : totals.expense;

        let color;
        if (mode === 'balance') color = value >= 0 ? '#22ff88' : '#ff3b5c';
        else if (mode === 'income') color = '#22ff88';
        else color = '#ff3b5c';

        animateValue(value);

        const displayText = formatMoney(animatedValue);
        const activeTheme = getActiveTheme();

        ctx.save();
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        if (mode === 'balance' && value < 0) {
          const shake = Math.sin(Date.now() / 50) * 1.5;
          ctx.translate(shake, 0);
        }

        if (activeTheme === 'cyberpunk') {
          ctx.globalAlpha = 0.96;

          ctx.shadowColor = '#00f5ff';
          ctx.shadowBlur = 24;
          ctx.fillStyle = '#00f5ff';
          ctx.fillText(displayText, centerX + 1.2, centerY);

          ctx.shadowColor = '#ff2bd6';
          ctx.shadowBlur = 18;
          ctx.fillStyle = '#ff2bd6';
          ctx.fillText(displayText, centerX - 1.2, centerY);

          ctx.shadowColor = color;
          ctx.shadowBlur = 20;
          ctx.fillStyle = color;
          ctx.fillText(displayText, centerX, centerY);

          const scanOffset = Math.sin(Date.now() / 190) * 2;
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'rgba(255,255,255,0.18)';
          ctx.fillText(displayText, centerX, centerY + scanOffset);
        } else {
          ctx.fillStyle = color;
          ctx.shadowColor = color;
          ctx.shadowBlur = 16;
          ctx.fillText(displayText, centerX, centerY);
        }

        ctx.restore();
      }
    };

    function renderChart() {
      if (chartInstance && typeof chartInstance.destroy === 'function') chartInstance.destroy();
      const { labels, values } = getChartData();
      const safeLabels = labels.length ? labels : ['Sin datos'];
      const safeValues = values.length ? values : [1];
      chartInstance = new Chart(elements.chartCanvas, {
        type: 'doughnut',
        data: { labels: safeLabels, datasets: [{ data: safeValues, backgroundColor: (context) => createChartGradients(context, safeValues.length), borderColor: '#020617', borderWidth: 2, hoverOffset: 12 }] },
        options: { responsive: true, maintainAspectRatio: true, cutout: '55%', plugins: { legend: { position: 'bottom', labels: { color: ['monster-zero', 'basic', 'cinnamon'].includes(getActiveTheme()) ? '#0f172a' : '#00f5ff', font: { weight: 'bold' } } }, tooltip: { backgroundColor: '#020617', borderColor: '#00f5ff', borderWidth: 1, titleColor: '#00f5ff', bodyColor: '#f8fafc' } }, animation: { duration: getActiveTheme() === 'ninja' ? 320 : 800, easing: getActiveTheme() === 'ninja' ? 'easeOutQuad' : 'easeOutExpo' } },
        plugins: [glowPlugin, centerTextPlugin]
      });
    }

    function createChartGradients(context, count) {
      const chart = context.chart;
      const canvasCtx = chart.ctx;
      const chartArea = chart.chartArea;
      const colors = getColors(count);
      if (!chartArea) return colors;
      return colors.map((color) => { const centerX = chartArea.left + chartArea.width / 2; const centerY = chartArea.top + chartArea.height / 2; const radius = Math.max(chartArea.width, chartArea.height) / 1.4; const gradient = canvasCtx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius); gradient.addColorStop(0, color); gradient.addColorStop(0.62, color); gradient.addColorStop(1, ['monster-zero', 'cinnamon'].includes(getActiveTheme()) ? '#e0f2fe' : '#020617'); return gradient; });
    }

    function createAudioContext() { const AudioContext = window.AudioContext || window.webkitAudioContext; if (!AudioContext) return null; if (!sharedAudioContext) sharedAudioContext = new AudioContext(); if (sharedAudioContext.state === 'suspended') sharedAudioContext.resume(); return sharedAudioContext; }
    function getThemeVolume(baseVolume) { const multipliers = { basic: 0.65, ninja: 0.38, fallout: 0.85, kuromi: 0.78, monster: 1.12, 'monster-zero': 0.72, cinnamon: 0.55, pixel: 0.9, pacman: 1, cyberpunk: 1 }; return baseVolume * (multipliers[getActiveTheme()] || 1); }

    function play8BitTone(audioContext, frequency, startTime, duration, volume = 0.12, detune = 0) { const oscillator = audioContext.createOscillator(); const gain = audioContext.createGain(); const filter = audioContext.createBiquadFilter(); oscillator.type = 'square'; oscillator.frequency.setValueAtTime(frequency, startTime); oscillator.detune.setValueAtTime(detune, startTime); filter.type = 'lowpass'; filter.frequency.setValueAtTime(2200, startTime); gain.gain.setValueAtTime(0, startTime); gain.gain.linearRampToValueAtTime(getThemeVolume(volume), startTime + 0.004); gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration); oscillator.connect(filter); filter.connect(gain); gain.connect(audioContext.destination); oscillator.start(startTime); oscillator.stop(startTime + duration); }

    function playCyberTone(audioContext, frequency, startTime, duration, volume = 0.18, detune = 0) { const oscA = audioContext.createOscillator(); const oscB = audioContext.createOscillator(); const gain = audioContext.createGain(); const filter = audioContext.createBiquadFilter(); const delay = audioContext.createDelay(); const delayGain = audioContext.createGain(); oscA.type = 'square'; oscB.type = 'sawtooth'; oscA.frequency.setValueAtTime(frequency, startTime); oscB.frequency.setValueAtTime(frequency * 1.01, startTime); oscA.detune.setValueAtTime(detune, startTime); oscB.detune.setValueAtTime(detune + 9, startTime); filter.type = 'bandpass'; filter.frequency.setValueAtTime(900, startTime); filter.frequency.exponentialRampToValueAtTime(3600, startTime + duration * 0.75); filter.Q.setValueAtTime(9, startTime); gain.gain.setValueAtTime(0, startTime); gain.gain.linearRampToValueAtTime(getThemeVolume(volume), startTime + 0.006); gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration); delay.delayTime.setValueAtTime(0.045, startTime); delayGain.gain.setValueAtTime(getThemeVolume(0.08), startTime); oscA.connect(filter); oscB.connect(filter); filter.connect(gain); gain.connect(audioContext.destination); gain.connect(delay); delay.connect(delayGain); delayGain.connect(audioContext.destination); oscA.start(startTime); oscB.start(startTime); oscA.stop(startTime + duration); oscB.stop(startTime + duration); }

    function playCyberNoise(audioContext, startTime, duration = 0.06, volume = 0.045) { const bufferSize = Math.max(1, Math.floor(audioContext.sampleRate * duration)); const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate); const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (i % 6 === 0 ? 1 : 0.25); const source = audioContext.createBufferSource(); const gain = audioContext.createGain(); const filter = audioContext.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.setValueAtTime(1800, startTime); gain.gain.setValueAtTime(getThemeVolume(volume), startTime); gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration); source.buffer = buffer; source.connect(filter); filter.connect(gain); gain.connect(audioContext.destination); source.start(startTime); source.stop(startTime + duration); }

    function playThemeSequence(type) { const ctx = createAudioContext(); if (!ctx) return; const now = ctx.currentTime; const theme = getActiveTheme(); if (theme === 'cyberpunk') return playCyberpunkSequence(ctx, now, type); if (theme === 'pacman') return playPacmanInspiredSequence(ctx, now, type); const sequences = SOUND_SEQUENCES[theme] || SOUND_SEQUENCES.basic; const sequence = sequences[type] || sequences.switch; sequence.forEach((note) => play8BitTone(ctx, note.frequency, now + note.delay, note.duration, note.volume, note.detune || 0)); }

    function playCyberpunkSequence(ctx, now, type) { if (type === 'switch') { playCyberNoise(ctx, now, 0.045, 0.055); playCyberTone(ctx, 392, now, 0.09, 0.15, -14); playCyberTone(ctx, 784, now + 0.055, 0.11, 0.17, 8); playCyberTone(ctx, 1568, now + 0.125, 0.16, 0.14, -4); playCyberNoise(ctx, now + 0.20, 0.035, 0.035); return; } if (type === 'save') { playCyberNoise(ctx, now, 0.035, 0.04); playCyberTone(ctx, 523.25, now, 0.07, 0.14, -8); playCyberTone(ctx, 1046.5, now + 0.055, 0.09, 0.18, 12); playCyberTone(ctx, 2093, now + 0.125, 0.13, 0.13, -6); return; } playCyberNoise(ctx, now, 0.055, 0.055); playCyberTone(ctx, 988, now, 0.08, 0.15, 10); playCyberTone(ctx, 494, now + 0.055, 0.10, 0.14, -10); playCyberTone(ctx, 185, now + 0.13, 0.15, 0.12, -18); playCyberNoise(ctx, now + 0.22, 0.04, 0.04); }

    function playPacmanInspiredSequence(ctx, now, type) { if (type === 'switch') { [494, 740, 494, 740, 554, 831].forEach((frequency, index) => play8BitTone(ctx, frequency, now + index * 0.045, 0.038, 0.105, index % 2 === 0 ? -6 : 6)); return; } if (type === 'save') { [523.25, 659.25, 783.99, 1046.5, 1318.51].forEach((frequency, index) => play8BitTone(ctx, frequency, now + index * 0.055, 0.05, 0.115, index % 2 === 0 ? 4 : -4)); return; } [987.77, 783.99, 587.33, 440, 293.66].forEach((frequency, index) => play8BitTone(ctx, frequency, now + index * 0.07, 0.06, 0.10, -index * 2)); }

    function playSwitchSound() { playThemeSequence('switch'); }
    function playSaveSound() { playThemeSequence('save'); }
    function playDeleteSound() { playThemeSequence('delete'); }

    function flashScreen() { document.body.classList.add('flash'); setTimeout(() => document.body.classList.remove('flash'), 400); }
    function glitchError() { elements.form.classList.add('error-glitch'); setTimeout(() => elements.form.classList.remove('error-glitch'), 300); }
    function animateTotals() { [elements.incomeTotal, elements.expenseTotal, elements.balanceTotal].forEach((el) => { el.classList.add('animate'); setTimeout(() => el.classList.remove('animate'), 300); }); }

    function checkAchievements() { const totals = getTotals(); if (totals.balance > 0 && !achievements.includes('positive')) unlockAchievement('positive', '🏆 Logro: Balance positivo'); if (records.length >= 5 && !achievements.includes('starter')) unlockAchievement('starter', '🚀 Logro: 5 registros completados'); const impulse = records.filter((r) => r.category === 'Gastos no planeados'); if (impulse.length === 0 && records.length >= 3 && !achievements.includes('disciplined')) unlockAchievement('disciplined', '🧠 Logro: Sin gastos impulsivos'); }
    function unlockAchievement(id, message) { achievements.push(id); saveAchievements(); alert(message); }

    function render() { renderSummary(); renderTable(); updateRecordsPanel(); if (mainTab === 'charts') renderChart(); }

    function runTests() {
      const originalRecords = records;
      const originalMode = mode;
      const originalTheme = getActiveTheme();
      const originalRecordsVisible = recordsVisible;
      records = [{ id: '1', type: 'income', amount: 100, origin: 'Trabajo', date: '2026-04-01' }, { id: '2', type: 'expense', amount: 40, category: 'Despensa', date: '2026-04-03' }];
      mode = 'balance'; console.assert(getTotals(records).balance === 60, 'Balance debe ser 60');
      mode = 'income'; console.assert(getVisibleRecords().every((record) => record.type === 'income'), 'Ganancias solo muestra ganancias');
      mode = 'expense'; console.assert(getVisibleRecords().every((record) => record.type === 'expense'), 'Gastos solo muestra gastos');
      editingRecordId = '1'; records = records.map((record) => String(record.id) === '1' ? { ...record, amount: 150 } : record); console.assert(records.find((record) => record.id === '1').amount === 150, 'Editar debe actualizar el registro correcto');
      console.assert(THEMES.includes('monster-zero'), 'El tema Monster Zero Ultra debe existir');
      console.assert(THEMES.includes('pixel'), 'El tema Pixel Mode debe existir');
      console.assert(THEMES.includes('pacman'), 'El tema Pac-Man Mode debe existir');
      recordsVisible = false; updateRecordsPanel(); console.assert(!elements.recordsPanel.classList.contains('open'), 'Registros debe iniciar oculto');
      records = originalRecords; mode = originalMode; recordsVisible = originalRecordsVisible; localStorage.setItem(THEME_KEY, originalTheme);
    }

    init();
  </script>
</body>
